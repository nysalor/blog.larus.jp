---
layout: page
title: Posts
description: 全記事一覧
---

{% for post in site.posts %}
<article class="post-preview">
  <a href="{{ post.url | prepend: site.baseurl }}">
    <h2 class="post-title">{{ post.title }}</h2>
  </a>
  <p class="post-meta">{{ post.date | date: '%Y-%m-%d' }}</p>
</article>
<hr>
{% endfor %}
